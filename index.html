<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Storefront | Shopzy</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body { display: block; align-items: flex-start; justify-content: flex-start; }
        .header {
            background: var(--card-bg);
            backdrop-filter: blur(var(--glass-blur));
            border-bottom: 1px solid var(--border-color);
            padding: 16px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .main-content {
            display: grid;
            grid-template-columns: 250px 1fr;
            gap: 40px;
            padding: 40px;
            max-width: 1400px;
            margin: 0 auto;
        }
        .sidebar {
            background: var(--card-bg);
            backdrop-filter: blur(var(--glass-blur));
            border: 1px solid var(--border-color);
            border-radius: 20px;
            padding: 24px;
            height: fit-content;
        }
        .product-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 24px;
        }
        .product-card {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            overflow: hidden;
            transition: var(--transition);
            cursor: pointer;
        }
        .product-card:hover { transform: translateY(-10px); box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .product-img { width: 100%; height: 200px; object-fit: cover; }
        .product-info { padding: 20px; }
        .product-price { color: var(--primary); font-size: 1.25rem; font-weight: 700; margin: 10px 0; }
        .category-filter-item {
            padding: 10px 0;
            cursor: pointer;
            color: var(--text-muted);
            transition: var(--transition);
        }
        .category-filter-item:hover, .category-filter-item.active { color: var(--primary); }
        .badge { display: none; }
        .cart-wrapper { position: relative; cursor: pointer; }
        #cart-count {
            position: absolute;
            top: -5px;
            right: -10px;
            background: #ef4444;
            color: white;
            font-size: 0.7rem;
            padding: 2px 6px;
            border-radius: 10px;
        }
        .admin-nav { display: none; margin-left: 20px; border-left: 1px solid var(--border-color); padding-left: 20px; }
        .qty-input { width: 60px; padding: 4px; border-radius: 8px; margin-right: 10px; }
    </style>
</head>
<body>
    <header class="header">
        <a href="index.html" class="logo">Shopzy</a>
        <div style="display: flex; align-items: center; gap: 24px;">
            <div id="admin-menu" class="admin-nav">
                <a href="category.html" class="footer-link" style="margin: 0 10px;">Categories</a>
                <a href="subcategory.html" class="footer-link" style="margin: 0 10px;">Sub-Cats</a>
                <a href="products-admin.html" class="footer-link" style="margin: 0 10px;">Admin Prods</a>
            </div>
            <div class="cart-wrapper" onclick="navigateTo('cart.html')">
                <span style="font-weight: 600;">🛒 Cart</span>
                <span id="cart-count">0</span>
            </div>
            <a href="orders.html" class="footer-link" style="margin: 0 10px; font-weight: 600;">📦 Orders</a>
            <span id="welcome-message" style="font-size: 0.9rem; margin-right: 10px;">Welcome!</span>
            <button onclick="logout()" style="padding: 8px 16px; font-size: 0.8rem; width: auto; background: #ef4444;">Logout</button>
        </div>
    </header>

    <div class="main-content">
        <aside class="sidebar">
            <h3 style="margin-bottom: 20px;">Filters</h3>
            <p style="font-size: 0.8rem; text-transform: uppercase; color: var(--text-muted);">Category</p>
            <div id="category-filters">
                <div class="category-filter-item active" onclick="filterByCategory('All', this)">All Products</div>
                <!-- Categories populated here -->
            </div>
        </aside>

        <main>
            <h1 id="page-title" style="text-align: left; margin-bottom: 30px;">All Products</h1>
            <div id="product-container" class="product-grid">
                <!-- Products populated here -->
            </div>
        </main>
    </div>

    <script src="auth.js"></script>
    <script src="utils.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const currentUser = JSON.parse(sessionStorage.getItem('currentUser'));
            if (!currentUser) { navigateTo('login.html'); return; }

            document.getElementById('welcome-message').innerText = `Hi, ${currentUser.name}`;
            if (currentUser.role === 'Admin') {
                document.getElementById('admin-menu').style.display = 'block';
            }
            
            renderFilters();
            renderStoreProducts('All');
            updateCartIcon();
        });

        function renderFilters() {
            const categories = JSON.parse(localStorage.getItem('categories') || '[]');
            const container = document.getElementById('category-filters');
            categories.forEach(cat => {
                const item = document.createElement('div');
                item.className = 'category-filter-item';
                item.innerText = cat.name;
                item.onclick = () => filterByCategory(cat.name, item);
                container.appendChild(item);
            });
        }

        function filterByCategory(catName, element) {
            document.querySelectorAll('.category-filter-item').forEach(i => i.classList.remove('active'));
            if (element) element.classList.add('active');
            document.getElementById('page-title').innerText = catName + ' Products';
            renderStoreProducts(catName);
        }

        function renderStoreProducts(filter) {
            const products = JSON.parse(localStorage.getItem('products') || '[]');
            const container = document.getElementById('product-container');
            const filtered = filter === 'All' ? products : products.filter(p => p.category === filter);

            container.innerHTML = filtered.map(p => `
                <div class="product-card">
                    <img src="${p.image}" class="product-img" onclick="navigateTo('product-detail.html?id=${p.id}')" 
                        onerror="this.src='https://placehold.co/400x400/1e1b4b/f8fafc?text=Product+Image'">
                    <div class="product-info">
                        <h3 onclick="navigateTo('product-detail.html?id=${p.id}')">${p.name}</h3>
                        <p class="product-price">$${parseFloat(p.price).toFixed(2)}</p>
                        <div style="display: flex; align-items: center; justify-content: space-between;">
                            <div>
                                <input type="number" id="qty-${p.id}" value="1" min="1" max="${p.stock}" class="qty-input">
                            </div>
                            <button onclick="addToCart(${p.id}, document.getElementById('qty-${p.id}').value)" style="width: auto; padding: 10px 15px;">Add to Cart</button>
                        </div>
                    </div>
                </div>
            `).join('') || '<p style="color: var(--text-muted)">No products found in this category.</p>';
        }
    </script>
</body>
</html>
