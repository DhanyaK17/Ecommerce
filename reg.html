<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration form</title>
    <link rel="shortcut icon" href="reg img.png" type="image/x-icon">
    <link rel="stylesheet" href="reg.css">
</head>

<body>
    <center>
        <fieldset class="reg">
            <legend>Registration Form</legend>
            
            <form action="login.html" class="form" id="regForm">
                <input type="text" id="name" placeholder="Enter your name" required><br>
                <input type="email" id="email" placeholder="Enter your email" required><br>
                <input type="password" id="password" placeholder="Enter your password" required><br>
                <input type="number" placeholder="Enter your number" required><br>
                <textarea placeholder="Address" cols="30" rows="10" id="message" required></textarea><br>
                <input type="submit" value="Submit">
                <input type="reset" value="Reset">
                <h2>Already have an account?<a href="login.html">Login</a></h2>
            </form>
        </fieldset>
    </center>


    <!-- script -->
    <script>
        window.onload = function () {
            document.getElementById('regForm').addEventListener('submit', function (event) {
                event.preventDefault();
                const username = document.getElementById('email').value;
                const password = document.getElementById('password').value;
                localStorage.setItem('registeredUser', username);
                localStorage.setItem('userPassword', password);
                window.location.href = "login.html";
            });
        }
    </script>
</body>

</html>
