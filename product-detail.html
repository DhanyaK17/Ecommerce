<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Detail | Shopzy</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .detail-container {
            max-width: 1000px;
            width: 100%;
            margin: 40px auto;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 60px;
            padding: 40px;
            background: var(--card-bg);
            backdrop-filter: blur(var(--glass-blur));
            border: 1px solid var(--border-color);
            border-radius: 30px;
        }
        .main-img {
            width: 100%;
            border-radius: 20px;
            object-fit: cover;
            aspect-ratio: 1;
        }
        .back-link {
            display: block;
            margin-bottom: 20px;
            color: var(--primary);
            text-decoration: none;
            font-weight: 600;
        }
        .detail-price {
            font-size: 2.5rem;
            color: var(--primary);
            font-weight: 800;
            margin: 20px 0;
        }
        .qty-selector {
            display: flex;
            align-items: center;
            gap: 20px;
            margin: 30px 0;
        }
    </style>
</head>
<body>
    <div class="container" style="max-width: 1100px;">
        <a href="index.html" class="back-link">← Back to Storefront</a>
        <div id="detail-wrapper" class="detail-container">
            <!-- Details populated by JS -->
            <p style="text-align: center; color: var(--text-muted);">Loading product details...</p>
        </div>
    </div>

    <script src="auth.js"></script>
    <script src="utils.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const urlParams = new URLSearchParams(window.location.search);
            const productId = urlParams.get('id');
            renderDetail(productId);
        });

        function renderDetail(id) {
            const products = JSON.parse(localStorage.getItem('products') || '[]');
            const p = products.find(prod => prod.id == id);
            
            if (!p) {
                document.getElementById('detail-wrapper').innerHTML = '<h2>Product not found.</h2>';
                return;
            }

            const wrapper = document.getElementById('detail-wrapper');
            wrapper.innerHTML = `
                <div>
                    <img src="${p.image}" class="main-img" alt="${p.name}" 
                        onerror="this.src='https://placehold.co/400x400/1e1b4b/f8fafc?text=Product+Image'">
                </div>
                <div>
                    <h1 style="text-align: left; margin-bottom: 20px;">${p.name}</h1>
                    <p style="color: var(--text-muted); font-size: 0.9rem; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 20px;">
                        ${p.category} > ${p.subcategory}
                    </p>
                    <p style="color: var(--text-main); line-height: 1.6; font-size: 1.1rem;">${p.desc}</p>
                    <p class="detail-price">$${parseFloat(p.price).toFixed(2)}</p>
                    <p style="color: var(--text-muted);">Availability: <span style="color: #4ade80;">${p.stock} In Stock</span></p>

                    <div class="qty-selector">
                        <label for="detail-qty" style="margin-bottom: 0;">Quantity:</label>
                        <input type="number" id="detail-qty" value="1" min="1" max="${p.stock}" style="width: 80px; padding: 10px;">
                    </div>

                    <div style="display: flex; gap: 20px;">
                        <button onclick="addToCart(${p.id}, document.getElementById('detail-qty').value)" style="flex: 2;">Add to Cart</button>
                        <button onclick="removeFromCart(${p.id}); location.reload()" style="flex: 1; background: #ef4444;">Remove from Cart</button>
                    </div>
                </div>
            `;
        }
    </script>
</body>
</html>
