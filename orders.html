<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Order History | Shopzy</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .order-history-container {
            max-width: 1000px;
            width: 100%;
            margin: 40px auto;
        }
        .order-item-card {
            background: var(--card-bg);
            border-radius: 20px;
            padding: 30px;
            border: 1px solid var(--border-color);
            margin-bottom: 24px;
            box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1);
        }
        .order-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 15px;
            margin-bottom: 20px;
        }
        .order-status {
            padding: 4px 12px;
            border-radius: 9999px;
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            background: rgba(16, 185, 129, 0.2);
            color: #10b981;
        }
        .order-product {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 12px;
            font-size: 0.9rem;
        }
        .order-product img { width: 40px; height: 40px; border-radius: 6px; object-fit: cover; }
    </style>
</head>
<body>
    <div class="container order-history-container">
        <a href="index.html" class="footer-link" style="display: inline-block; margin-bottom: 20px;">← Back to Shopping</a>
        <h1 style="text-align: left; margin-bottom: 30px;">My Orders</h1>
        
        <div id="orders-list">
            <!-- Orders populated here -->
            <p style="text-align: center; color: var(--text-muted);">Fetching your orders...</p>
        </div>
    </div>

    <script src="auth.js"></script>
    <script src="utils.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const orders = getOrders();
            const container = document.getElementById('orders-list');

            if (orders.length === 0) {
                container.innerHTML = `
                    <div class="card" style="text-align: center; padding: 60px;">
                        <p style="font-size: 1.2rem; color: var(--text-muted); margin-bottom: 20px;">No orders found yet.</p>
                        <button onclick="navigateTo('index.html')" style="width: auto; padding: 12px 24px;">Start Shopping</button>
                    </div>
                `;
                return;
            }

            container.innerHTML = orders.map(order => `
                <div class="order-item-card">
                    <div class="order-header">
                        <div>
                            <p style="font-size: 0.75rem; color: var(--text-muted); text-transform: uppercase;">Order ID</p>
                            <h4 style="color: var(--primary);">${order.id}</h4>
                        </div>
                        <div style="text-align: right;">
                            <p style="font-size: 0.75rem; color: var(--text-muted); text-transform: uppercase;">Date</p>
                            <p style="font-weight: 500;">${order.date}</p>
                        </div>
                    </div>

                    <div style="margin-bottom: 20px;">
                        ${order.items.map(item => `
                            <div class="order-product">
                                <img src="${item.image}" alt="${item.name}" onerror="this.src='https://placehold.co/400x400/1e1b4b/f8fafc?text=Product'">
                                <div style="flex: 1;">
                                    <strong>${item.name}</strong> • x${item.quantity}
                                </div>
                                <div style="color: var(--text-muted);">$${(item.price * item.quantity).toFixed(2)}</div>
                            </div>
                        `).join('')}
                    </div>

                    <div style="display: flex; justify-content: space-between; align-items: center; border-top: 1px solid var(--border-color); padding-top: 15px;">
                        <div>
                             <span class="order-status">${order.status}</span>
                        </div>
                        <div style="font-size: 1.25rem; font-weight: 700;">
                            Total: $${order.total.toFixed(2)}
                        </div>
                    </div>
                    
                    <div style="margin-top: 15px; font-size: 0.8rem; color: var(--text-muted); padding: 10px; background: rgba(255,255,255,0.05); border-radius: 10px;">
                        📍 Delivery Address: ${order.customer.address} | 💳 Paid via ${order.payment.method}
                    </div>
                </div>
            `).join('');
        });
    </script>
</body>
</html>
